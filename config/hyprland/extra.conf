# # Hyprexpo
bind = , XF86Launch1, hyprexpo:expo, toggle

bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, V, exec, $clipboardHistory

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod shift, H, movewindow, l
bind = $mainMod shift, L, movewindow, r
bind = $mainMod shift, K, movewindow, u
bind = $mainMod shift, J, movewindow, d
bind = $mainMod ctrl, H, resizeactive, -50 0
bind = $mainMod ctrl, L, resizeactive, 50 0
bind = $mainMod ctrl, K, resizeactive, 0 -50
bind = $mainMod ctrl, J, resizeactive, 0 50

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
bind = $mainMod, M, togglespecialworkspace, magic
bind = $mainMod SHIFT, M, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = ,XF86KbdBrightnessUp,   exec, brightnessctl --device='asus::kbd_backlight' set 1+
bindel = ,XF86KbdBrightnessDown, exec, brightnessctl --device='asus::kbd_backlight' set 1-
bindel = ,XF86Launch4, exec, powerprofilesctl-cycle 


# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Laptop suspend/resume
bindl= , switch:off:Lid Switch, exec, $ipc lockScreen lockAndSuspend

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules
windowrule {
  name = bitwarden
  match:class = ^(Bitwarden)$

  animation = popin
  float = on
}
windowrule {
  name = blender-floating
  match:class = blender
  match:float = 1

  size = 960 535
}
windowrule {
  name = zotero-citing
  match:class = org.zotero.Zotero
  match:title = (Zitations-Dialog|Zotero-Einstellungen)

  move = 0 0
  size = 500 350
  animation = popin
  float = on
  center = off
  suppress_event = maximize
}
windowrule = match:float false, hyprbars:no_bar true

plugin {
  touch_gestures {
    # The default sensitivity is probably too low on tablet screens,
    # I recommend turning it up to 4.0
    sensitivity = 1.0
    
    # must be >= 3
    workspace_swipe_fingers = 4
    
    # switching workspaces by swiping from an edge, this is separate from workspace_swipe_fingers
    # and can be used at the same time
    # possible values: l, r, u, or d
    # to disable it set it to anything else
    workspace_swipe_edge = d
    
    # in milliseconds
    long_press_delay = 400
    
    # resize windows by long-pressing on window borders and gaps.
    # If general:resize_on_border is enabled, general:extend_border_grab_area is used for floating
    # windows
    resize_on_border_long_press = true
    
    # in pixels, the distance from the edge that is considered an edge
    edge_margin = 10
    
    # emulates touchpad swipes when swiping in a direction that does not trigger workspace swipe.
    # ONLY triggers when finger count is equal to workspace_swipe_fingers
    #
    # might be removed in the future in favor of event hooks
    emulate_touchpad_swipe = false
    
    experimental {
      # send proper cancel events to windows instead of hacky touch_up events,
      # NOT recommended as it crashed a few times, once it's stabilized I'll make it the default
      send_cancel = 0
    }
    
    hyprgrass-bind = , swipe:4:d, killactive
    hyprgrass-bind = , swipe:3:d, overview:toggle
    
    hyprgrass-bind = , edge:d:u, exec, /etc/nixos/config/swipeGuess/wvkbd-toggle.sh
    
    # longpress can trigger mouse binds:
    hyprgrass-bindm = , longpress:3, movewindow
    hyprgrass-bindm = , longpress:4, resizewindow
  }
  hy3 {
    no_gaps_when_only = 1
    autotile {
        enable = true
      }
  }
  hyprtasking {
    layout = grid

    gap_size = 20
    bg_color = 0xff26233a
    border_size = 4
    exit_on_hovered = true
    warp_on_move_window = 1
    close_overview_on_reload = true

    drag_button = 0x110 # left mouse button
    select_button = 0x111 # right mouse button
    # for other mouse buttons see <linux/input-event-codes.h>

    gestures {
      enabled = true
      move_fingers = 3
      move_distance = 300
      open_fingers = 4
      open_distance = 300
      open_positive = true
    }

    grid {
      rows = 3
      cols = 3
      loop = true
      gaps_use_aspect_ratio = true
    }

    linear {
      height = 400
      scroll_speed = 1.0
      blur = false
    }
  }
  hyprexpo {
    columns = 3
    gap_size = 5
    bg_col = rgb(111111)
    workspace_method = first 1 # [center/first] [workspace] e.g. first 1 or center m+1
    hyprexpo-gesture = 3, vertical, expo
  }
  hyprbars {
    # example config
    bar_height = 30

    # example buttons (R -> L)
    # hyprbars-button = color, size, on-click
    hyprbars-button = rgb(ff4040), 20, 󰖭, hyprctl dispatch killactive
    hyprbars-button = rgb(eeee11), 20, , hyprctl dispatch fullscreen 1

    # cmd to run on double click of the bar
    on_double_click = hyprctl dispatch fullscreen 1
  }
  hyprfocus {
    enabled = yes

    keyboard_focus_animation = shrink
    mouse_focus_animation = flash

    bezier = bezIn, 0.5,0.0,1.0,0.5
    bezier = bezOut, 0.0,0.5,0.5,1.0

    flash {
        flash_opacity = 0.7

        in_bezier = bezIn
        in_speed = 0.5

        out_bezier = bezOut
        out_speed = 3
    }

    shrink {
        shrink_percentage = 0.8

        in_bezier = bezIn
        in_speed = 0.5

        out_bezier = bezOut
        out_speed = 3
    }
  }
}
