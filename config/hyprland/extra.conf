# bind = , XF86Launch1, hyprtasking:toggle, all
# bind = $mainMod, SPACE, hyprtasking:toggle, all
# bind = , escape, hyprtasking:if_active, hyprtasking:toggle cursor
# bind = , return, hyprtasking:if_active, hyprtasking:toggle cursor
# bind = , h, hyprtasking:if_active, hyprtasking:move left
# bind = , j, hyprtasking:if_active, hyprtasking:move down
# bind = , k, hyprtasking:if_active, hyprtasking:move up
# bind = , l, hyprtasking:if_active, hyprtasking:move right
# bind = shift, h, hyprtasking:if_active, hyprtasking:movewindow left
# bind = shift, j, hyprtasking:if_active, hyprtasking:movewindow down
# bind = shift, k, hyprtasking:if_active, hyprtasking:movewindow up
# bind = shift, l, hyprtasking:if_active, hyprtasking:movewindow right
# bind = , x, hyprtasking:if_active, hyprtasking:killhovered 
# bind = CONTROL_SUPER_SHIFT, H, hyprtasking:movewindow, left
# bind = CONTROL_SUPER_SHIFT, L, hyprtasking:movewindow, right
# bind = CONTROL_SUPER_SHIFT, K, hyprtasking:movewindow, up
